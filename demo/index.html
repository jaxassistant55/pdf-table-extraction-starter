<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Extraction Dashboard Sample</title>
  <style>
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#1b1f24;line-height:1.45}
    main{width:min(900px,calc(100% - 32px));margin:0 auto;padding:28px 0}
    h1{margin:0 0 8px;font-size:clamp(1.7rem,3vw,2.3rem);letter-spacing:0}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:18px 0}
    .card{border:1px solid #d7dde5;border-radius:8px;background:#f6f8fa;padding:12px}.card strong{font-size:1.4rem}
    table{width:100%;border-collapse:collapse;border:1px solid #d7dde5}th,td{padding:9px;border-bottom:1px solid #d7dde5;text-align:left}th{background:#f6f8fa;color:#5c6670}
    @media(max-width:760px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body><main>
  <h1>Extraction Dashboard Sample</h1>
  <p>Synthetic data only. Real extraction requires authorized files.</p>
  <div class="grid"><div class="card"><strong>3</strong><br>rows</div><div class="card"><strong>$665.50</strong><br>total</div><div class="card"><strong>1</strong><br>due invoice</div></div>
  <table><thead><tr><th>Category</th><th>Total</th></tr></thead><tbody><tr><td>Design</td><td>$420.00</td></tr><tr><td>Software</td><td>$89.00</td></tr><tr><td>Marketing</td><td>$156.50</td></tr></tbody></table>
</main></body></html>
